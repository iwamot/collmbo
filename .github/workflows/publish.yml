name: Publish Docker images

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    uses: iwamot/workflows/.github/workflows/publish-ghcr.yml@87fc7cf164c94bcd8515158b76dac3c30fda5ac9 # v0.10.2
    permissions:
      contents: read
      id-token: write
      packages: write
    secrets:
      dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
