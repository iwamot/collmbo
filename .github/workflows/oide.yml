name: Oide

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/oide.yml

permissions: {}

jobs:
  pull:
    permissions:
      contents: read
    uses: iwamot/workflows/.github/workflows/oide.yml@3a106f414b2ee346211a9c9050a27e2f26336796 # v7.0.0
    with:
      # renovate: datasource=github-tags depName=iwamot/repo-template
      TEMPLATE_VERSION: v1.5.0
    secrets:
      OIDE_APP_CLIENT_ID: ${{ secrets.OIDE_APP_CLIENT_ID }}
      OIDE_APP_PRIVATE_KEY: ${{ secrets.OIDE_APP_PRIVATE_KEY }}
