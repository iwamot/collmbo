name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-draft:
    name: release-draft
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: write  # to create the draft GitHub Release
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: iwamot/actions/release-draft@09a90ef28919b6331a2930f6e61eeca11bc634de # v0.9.0

  publish:
    needs: release-draft
    uses: iwamot/workflows/.github/workflows/publish-ghcr.yml@2999ae87b709bd1b1bb9ab110aa3055828848898 # v6.0.0
    permissions:
      contents: read
      id-token: write   # to mint OIDC token for image signing
      packages: write   # to push to GHCR
    secrets:
      dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

  release-publish:
    needs: publish
    name: release-publish
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: write  # to flip the draft GitHub Release to published
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: iwamot/actions/release-publish@09a90ef28919b6331a2930f6e61eeca11bc634de # v0.9.0
